<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astra – Apps</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" id="dynamic-favicon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

  <style>
    /* 1. CORE RESET & VARIABLES */
    :root {
      --cursor-size: 20px;
      --cursor-hover-size: 60px;
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --accent: #818cf8;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    *, *::before, *::after {
      cursor: none !important; /* Force hide default cursor normally */
      box-sizing: border-box;
    }

    /* CRITICAL FIX: Restores default cursor when app is open */
    body.app-active, body.app-active * {
      cursor: auto !important;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #050505;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 2. BACKGROUND CANVAS (STARS) */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.6;
    }

    /* 3. LAYOUT */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
      position: relative;
      z-index: 10;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* 4. HEADER & UTILITIES */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 4rem;
      margin: 0 0 20px 0;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(129, 140, 248, 0.3));
    }

    .utility-bar {
      display: inline-flex;
      gap: 15px;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      margin-bottom: 30px;
    }

    .utility-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .utility-btn:hover {
      background: rgba(255,255,255,0.1);
      color: white;
      border-color: rgba(255,255,255,0.3);
    }

    /* 5. NAVIGATION */
    .nav-bar {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 100;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .home-btn:hover {
      background: #fff;
      color: #000;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255,255,255,0.2);
    }

    /* 6. APP GRID */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .app-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      backdrop-filter: blur(5px);
      position: relative;
      overflow: hidden;
    }

    .app-card img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
      transition: transform 0.3s ease;
      z-index: 2;
    }

    .app-card span {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.3s ease;
      z-index: 2;
    }

    /* Hover Glow Effect */
    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(129, 140, 248, 0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 1;
    }

    .app-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-8px);
      box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5);
    }

    .app-card:hover::before { opacity: 1; }
    .app-card:hover img { transform: scale(1.15) rotate(-5deg); }
    .app-card:hover span { color: #fff; }

    /* 7. IFRAME OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      transition: opacity 0.3s ease;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-bar {
      height: 40px;
      background: #0a0a0a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .overlay-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      color: #888;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: #888;
      font-size: 24px;
      cursor: pointer !important; /* Force pointer for close btn */
    }

    .close-btn:hover { color: #fff; }

    .iframe-wrapper {
      flex: 1;
      width: 100%;
      background: #000;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 8. CUSTOM CURSOR (Main Page Style) */
    .cursor {
      width: var(--cursor-size);
      height: var(--cursor-size);
      background: white;
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 10000;
      mix-blend-mode: difference;
      transform: translate3d(-50%, -50%, 0);
      will-change: transform, width, height;
      transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), 
                  height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .cursor.hover {
      width: var(--cursor-hover-size);
      height: var(--cursor-hover-size);
      opacity: 1;
    }

    /* HIDE custom cursor when app is open */
    body.app-active .cursor {
      display: none;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(129, 140, 248, 0.2);
      border: 1px solid var(--accent);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      transform: translateY(100px);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2000;
      font-size: 0.9rem;
    }
    .toast.show { transform: translateY(0); }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="nav-bar">
    <a href="/astra/index.html" class="home-btn">← Home</a>
  </div>

  <div class="container">
    <h1>Apps</h1>

    <div class="utility-bar">
      <button class="utility-btn" onclick="cloakTab('default')"><span>Reset</span></button>
      <button class="utility-btn" onclick="cloakTab('drive')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" width="16" alt="">
        <span>Drive</span>
      </button>
      <button class="utility-btn" onclick="cloakTab('classroom')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_Logo.png" width="16" alt="">
        <span>Classroom</span>
      </button>
    </div>
    
    <p style="color: #666; font-size: 0.8rem; margin-top: -20px; margin-bottom: 40px;">
      Panic Button: Press <b>]</b> to exit immediately.
    </p>

    <div class="app-grid">
      
      <div class="app-card" data-url="https://scramjet.mercurywork.shop/scramjet/https%3A%2F%2Fwww.google.com%2F%3Fzx%3D1770699498684%26no_sw_cr%3D1">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Browser">
        <span>Browser</span>
      </div>

      <div class="app-card" data-url="https://scramjet.mercurywork.shop/scramjet/https%3A%2F%2Fwww.youtube.com%2F">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube">
        <span>YouTube</span>
      </div>

      <div class="app-card" data-url="https://scramjet.mercurywork.shop/scramjet/https%3A%2F%2Fdiscord.com%2F">
        <img src="https://assets-global.website-files.com/6257adef93867e56f84d3092/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Discord">
        <span>Discord</span>
      </div>

      <div class="app-card" data-url="https://scramjet.mercurywork.shop/scramjet/https%3A%2F%2Fwww.tiktok.com%2Fexplore">
        <img src="https://sf16-scmcdn-va.ibytedtos.com/goofy/tiktok/web/node/_next/static/images/logo-dark-e95da587b61837f722a774360d50a699.svg" style="filter: invert(1);" alt="TikTok">
        <span>TikTok</span>
      </div>

      <div class="app-card" data-url="https://scramjet.mercurywork.shop/scramjet/https%3A%2F%2Fchatgpt.com%2F">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" alt="ChatGPT">
        <span>ChatGPT</span>
      </div>

      <div class="app-card" data-url="https://open.spotify.com">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify">
        <span>Spotify</span>
      </div>

    </div>
  </div>

  <div class="overlay" id="appOverlay">
    <div class="overlay-bar">
      <div class="overlay-title" id="overlayTitle">App</div>
      <button class="close-btn" id="closeOverlayBtn">×</button>
    </div>
    <div class="iframe-wrapper">
      <iframe src="" id="appFrame" allow="fullscreen; clipboard-read; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </div>
  </div>

  <div class="cursor" id="cursor"></div>
  <div class="toast" id="toast">Tab Cloaked</div>

  <script>
    // --- 1. SMOOTH CURSOR ---
    const cursor = document.getElementById('cursor');
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let curPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    function animateCursor() {
      const ease = 0.15;
      curPos.x += (mouse.x - curPos.x) * ease;
      curPos.y += (mouse.y - curPos.y) * ease;
      cursor.style.left = `${curPos.x}px`;
      cursor.style.top = `${curPos.y}px`;
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Hover Listeners
    document.querySelectorAll('button, .app-card, a').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // --- 2. STARFIELD BACKGROUND ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initStars();
    }

    function initStars() {
      stars = [];
      const starCount = Math.floor((width * height) / 5000);
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5,
          speed: Math.random() * 0.4 + 0.1,
          opacity: Math.random()
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "white";
      
      stars.forEach(star => {
        ctx.globalAlpha = star.opacity;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        
        star.y -= star.speed;
        if (star.y < -5) star.y = height + 5;
      });
      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', resize);
    resize();
    drawStars();

    // --- 3. UTILITIES (Cloak / Panic) ---
    const favicon = document.getElementById('dynamic-favicon');
    
    function cloakTab(type) {
      if (type === 'drive') {
        document.title = 'My Drive - Google Drive';
        favicon.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
        showToast("Cloaked as Google Drive");
      } else if (type === 'classroom') {
        document.title = 'Classes';
        favicon.href = 'https://ssl.gstatic.com/classroom/favicon.png';
        showToast("Cloaked as Google Classroom");
      } else {
        document.title = 'Astra – Apps';
        favicon.href = '/favicon.ico';
        showToast("Cloak Reset");
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === ']') window.location.href = 'https://www.google.com';
    });

    // --- 4. APP OPENING LOGIC ---
    const overlay = document.getElementById('appOverlay');
    const iframe = document.getElementById('appFrame');
    const overlayTitle = document.getElementById('overlayTitle');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    document.querySelectorAll('.app-card').forEach(card => {
      card.addEventListener('click', () => {
        const url = card.getAttribute('data-url');
        const name = card.querySelector('span').innerText;
        
        if (url) {
          overlayTitle.innerText = name;
          iframe.src = url;
          // Add class to body to revert cursor to system default
          document.body.classList.add('app-active'); 
          overlay.classList.add('active');
        }
      });
    });

    function closeApp() {
      overlay.classList.remove('active');
      // Remove class from body to bring back custom cursor
      document.body.classList.remove('app-active');
      setTimeout(() => { iframe.src = ''; }, 300);
    }

    closeOverlayBtn.addEventListener('click', closeApp);
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        closeApp();
      }
    });

  </script>
</body>
</html>
