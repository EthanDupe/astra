<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astra – Apps</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

  <style>
    /* 1. CORE RESET & VARIABLES */
    :root {
      --cursor-size: 20px;
      --cursor-hover-size: 60px;
      --text-main: #ffffff;
      --text-muted: #888888;
      --accent: #a5b4fc;
    }

    *, *::before, *::after {
      cursor: none !important;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #050505;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 2. BACKGROUND CANVAS (STARS) */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.6;
    }

    /* 3. LAYOUT & HEADER */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
      position: relative;
      z-index: 10;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 4rem;
      margin-bottom: 40px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(165, 180, 252, 0.2));
    }

    /* 4. NAVIGATION (HOME BTN) */
    .nav-bar {
      position: absolute;
      top: 30px;
      left: 30px;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .home-btn:hover {
      background: #fff;
      color: #000;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255,255,255,0.2);
    }

    /* 5. GRID SYSTEM */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 25px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* 6. APP CARDS */
    .app-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 30px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      backdrop-filter: blur(5px);
    }

    .app-card img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
      transition: transform 0.3s ease;
    }

    .app-card span {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    /* Hover Effects */
    .app-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-10px);
      box-shadow: 0 15px 30px -5px rgba(0,0,0,0.5);
    }

    .app-card:hover img {
      transform: scale(1.1);
    }

    .app-card:hover span {
      color: #fff;
    }

    /* 7. IFRAME OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(15px);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.4s ease;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .iframe-container {
      width: 90%;
      height: 85%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transform: scale(0.95);
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .overlay.active .iframe-container {
      transform: scale(1);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: #ff4d4d;
      border-color: #ff4d4d;
      transform: rotate(90deg);
    }

    /* 8. CUSTOM CURSOR */
    .cursor {
      width: var(--cursor-size);
      height: var(--cursor-size);
      background: white;
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10000;
      mix-blend-mode: difference;
      transform: translate3d(-50%, -50%, 0);
      will-change: transform, width, height;
      transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), 
                  height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .cursor.hover {
      width: var(--cursor-hover-size);
      height: var(--cursor-hover-size);
      opacity: 0.8;
    }

  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="nav-bar">
    <a href="/astra/index.html" class="home-btn">← Home</a>
  </div>

  <div class="container">
    <h1>Apps</h1>

    <div class="app-grid">
      <div class="app-card" data-url="https://edgedcircles.com/uv/service/hvtrs8%2F-wuw%2Ctkkvoi.aoo%2Fgxrlmrg">
        <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/tiktok-icon-white-round-logo.png" alt="TikTok">
        <span>TikTok</span>
      </div>

      <div class="app-card" data-url="https://edgedcircles.com/uv/service/hvtrs8%2F-cjavgrt%2Ccmm-">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" alt="ChatGPT">
        <span>ChatGPT</span>
      </div>

      <div class="app-card" data-url="https://edgedcircles.com/uv/service/hvtrs8%2F-wuw%2Cntific.aoo%2Ffe%2Fdg%2Feedopcg-lou%2F">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/21/NVIDIA_GeForce_NOW_logo.svg" alt="GeForce Now">
        <span>GeForce</span>
      </div>

      <div class="app-card" data-url="https://ixl.com.de/frog/ixl/hvtrs8%252F-wuw%252Cngwermuldq.aoo%252F">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Newgrounds_logo.svg" alt="Newgrounds">
        <span>Newgrounds</span>
      </div>

      <div class="app-card" data-url="https://edgedcircles.com/uv/service/hvtrs8%2F-wuw%2Cecs%7Bfwn%2Cge%2F">
        <img src="https://www.vhv.rs/dpng/d/43-439337_game-controller-icon-white-png-transparent-png.png" alt="Easy Fun">
        <span>Easy Fun</span>
      </div>

      <div class="app-card" data-url="https://edgedcircles.com/uv/service/hvtrs8%2F-wuw%2Cymuvu%60e%2Ccmm-">
        <img src="https://www.iconpacks.net/icons/2/free-youtube-logo-icon-2431-thumb.png" alt="YouTube">
        <span>YouTube</span>
      </div>
    </div>
  </div>

  <div class="overlay" id="iframeOverlay">
    <button class="close-btn" id="closeBtn">&times;</button>
    <div class="iframe-container">
      <iframe src="" allow="fullscreen; autoplay; encrypted-media"></iframe>
    </div>
  </div>

  <div class="cursor" id="cursor"></div>

  <script>
    // --- 1. SMOOTH CURSOR ---
    const cursor = document.getElementById('cursor');
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let curPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    function animateCursor() {
      const ease = 0.15;
      curPos.x += (mouse.x - curPos.x) * ease;
      curPos.y += (mouse.y - curPos.y) * ease;
      
      cursor.style.left = `${curPos.x}px`;
      cursor.style.top = `${curPos.y}px`;
      
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Hover Effects
    document.querySelectorAll('.app-card, .home-btn, .close-btn').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // --- 2. BACKGROUND PARTICLES (STARS) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initStars();
    }

    function initStars() {
      stars = [];
      const starCount = Math.floor((width * height) / 6000); 
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5,
          speed: Math.random() * 0.5 + 0.1
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
      
      stars.forEach(star => {
        const parallaxX = (mouse.x - width/2) * 0.02;
        const parallaxY = (mouse.y - height/2) * 0.02;

        ctx.beginPath();
        ctx.arc(star.x + parallaxX, star.y + parallaxY, star.size, 0, Math.PI * 2);
        ctx.fill();
        
        star.y -= star.speed;
        if (star.y < -5) star.y = height + 5;
      });
      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', resize);
    resize();
    drawStars();

    // --- 3. OVERLAY LOGIC ---
    const overlay = document.getElementById('iframeOverlay');
    const iframe = overlay.querySelector('iframe');
    const closeBtn = document.getElementById('closeBtn');

    document.querySelectorAll('.app-card').forEach(card => {
      card.addEventListener('click', () => {
        const url = card.dataset.url;
        if(url) {
          iframe.src = url;
          overlay.classList.add('active');
        }
      });
    });

    function closeOverlay() {
      overlay.classList.remove('active');
      setTimeout(() => { iframe.src = ''; }, 400); // Clear src to stop audio
    }

    closeBtn.addEventListener('click', closeOverlay);

    // Close on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        closeOverlay();
      }
    });
  </script>

</body>
</html>
