<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astra | Fluid</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" id="dynamic-favicon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav class="global-nav">
    <div class="nav-brand">Astra</div>
    <div class="nav-links">
      <a href="#" onclick="switchTab('home')">Home</a>
      <a href="#" onclick="switchTab('apps')">Apps</a>
      <a href="#" onclick="switchTab('games')">Games</a>
      <a href="#" onclick="switchTab('tools')">Tools</a>
    </div>
  </nav>

  <main id="main-content">
    
    <section id="home" class="view-section active">
      <div class="hero-container">
        <h1 class="glitch-title">Astra</h1>
        <p>Where unblocked games meet reality.</p>
      </div>
    </section>

    <section id="apps" class="view-section">
      <div class="container">
        <h2>Apps</h2>
        <div class="app-grid">
          <div class="app-card" onclick="openApp('https://chatgpt.com/')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" alt="ChatGPT">
            <span>ChatGPT</span>
          </div>
        </div>
      </div>
    </section>

    <section id="games" class="view-section">
      <div class="container">
        <h2>Games</h2>
        <div class="app-grid">
           <button class="game-btn">Among Us</button>
           <button class="game-btn">Slope</button>
        </div>
      </div>
    </section>

    <section id="tools" class="view-section">
      <div class="container">
        <h2>Utility Tools</h2>
        </div>
    </section>

  </main>

  <div class="overlay" id="appOverlay">
    <div class="overlay-bar">
      <div class="overlay-title" id="overlayTitle">App</div>
      <button class="close-btn" onclick="closeApp()">×</button>
    </div>
    <div class="iframe-wrapper">
      <iframe src="" id="appFrame"></iframe>
    </div>
  </div>

  <div class="cursor" id="cursor"></div>

  <script src="script.js"></script>
</body>
</html>
