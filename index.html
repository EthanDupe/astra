<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astra</title>
  
  <!-- Roboto Flex Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
  
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="loading-screen">astra</div>

  <div class="content-wrapper" id="content">
    <header>Astra</header>
    <nav>
      <a href="https://ethandupe.github.io/games-main/">Games</a>
      <a href="/astra/tools.html">Tools</a>
      <a href="/astra/apps.html">Apps</a>
      <a href="https://ethandupe.github.io/astra/fluidcam">FluidCam</a>
      <!-- Theme Toggle Button -->
      <button id="theme-toggle" aria-label="Toggle Dark Mode">◑</button>
    </nav>
  </div>

  <div class="cursor" id="cursor"></div>

  <div class="footer-tracker">
    <div id="sfcrjbejqnhn8bx29s5acyl9qx3fkk7aerg"></div>
  </div>
  <script type="text/javascript" src="https://counter5.optistats.ovh/private/counter.js?c=rjbejqnhn8bx29s5acyl9qx3fkk7aerg&down=async" async></script>

  <script>
    // --- 0. BULLETPROOF THEME TOGGLE ---
    const themeToggle = document.getElementById('theme-toggle');

    function setTheme(isDark) {
      if (isDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        try { localStorage.setItem('astra-theme', 'dark'); } catch(e) {}
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        try { localStorage.setItem('astra-theme', 'light'); } catch(e) {}
      }
    }

    // Check saved theme on load (with failsafe)
    let isDarkTheme = false;
    try {
      isDarkTheme = localStorage.getItem('astra-theme') === 'dark';
    } catch(e) {}
    setTheme(isDarkTheme);

    // Toggle click event
    themeToggle.addEventListener('click', () => {
      isDarkTheme = document.documentElement.getAttribute('data-theme') !== 'dark';
      setTheme(isDarkTheme);
    });

    // --- 1. SETUP & LOADING ---
    const loadingScreen = document.getElementById('loading-screen');
    const content = document.getElementById('content');
    const cursor = document.getElementById('cursor');

    window.addEventListener('load', () => {
      setTimeout(() => {
        loadingScreen.style.opacity = '0';
        loadingScreen.style.visibility = 'hidden';
        content.classList.add('loaded');
      }, 800);
    });

    // --- 2. SMOOTH CURSOR ---
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let curPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    function animateCursor() {
      const ease = 0.15;
      curPos.x += (mouse.x - curPos.x) * ease;
      curPos.y += (mouse.y - curPos.y) * ease;
      
      cursor.style.left = `${curPos.x}px`;
      cursor.style.top = `${curPos.y}px`;
      
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Hover Listeners
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // --- 3. BACKGROUND PARTICLES (STARS) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let stars = [];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initStars();
    }
    
    function initStars() {
      stars = [];
      const starCount = Math.floor((width * height) / 6000); 
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5,
          speed: Math.random() * 0.5 + 0.1
        });
      }
    }
    
    function drawStars() {
      ctx.clearRect(0, 0, width, height);
      // Match stars to theme dynamically!
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      ctx.fillStyle = isDark ? "rgba(255, 255, 255, 0.8)" : "rgba(255, 255, 255, 0.6)"; 
      
      stars.forEach(star => {
        const parallaxX = (mouse.x - width/2) * 0.02;
        const parallaxY = (mouse.y - height/2) * 0.02;

        ctx.beginPath();
        ctx.arc(star.x + parallaxX, star.y + parallaxY, star.size, 0, Math.PI * 2);
        ctx.fill();
        
        star.y -= star.speed;
        if (star.y < -5) star.y = height + 5;
      });
      
      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', resize);
    resize();
    drawStars();
  </script>
</body>
</html>
