  <script>
    // --- 0. BULLETPROOF THEME TOGGLE ---
    const themeToggle = document.getElementById('theme-toggle');

    function setTheme(isDark) {
      if (isDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        try { localStorage.setItem('astra-theme', 'dark'); } catch(e) {}
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        try { localStorage.setItem('astra-theme', 'light'); } catch(e) {}
      }
    }

    // Check saved theme on load (with failsafe)
    let isDarkTheme = false;
    try {
      isDarkTheme = localStorage.getItem('astra-theme') === 'dark';
    } catch(e) {}
    setTheme(isDarkTheme);

    // Toggle click event
    themeToggle.addEventListener('click', () => {
      isDarkTheme = document.documentElement.getAttribute('data-theme') !== 'dark';
      setTheme(isDarkTheme);
    });

    // --- 1. SETUP & LOADING ---
    const loadingScreen = document.getElementById('loading-screen');
    const content = document.getElementById('content');
    const cursor = document.getElementById('cursor');

    window.addEventListener('load', () => {
      setTimeout(() => {
        loadingScreen.style.opacity = '0';
        loadingScreen.style.visibility = 'hidden';
        content.classList.add('loaded');
      }, 800);
    });

    // --- 2. SMOOTH CURSOR ---
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let curPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    function animateCursor() {
      const ease = 0.15;
      curPos.x += (mouse.x - curPos.x) * ease;
      curPos.y += (mouse.y - curPos.y) * ease;
      
      cursor.style.left = `${curPos.x}px`;
      cursor.style.top = `${curPos.y}px`;
      
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Hover Listeners
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // --- 3. BACKGROUND PARTICLES (STARS) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let stars = [];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initStars();
    }
    
    function initStars() {
      stars = [];
      const starCount = Math.floor((width * height) / 6000); 
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5,
          speed: Math.random() * 0.5 + 0.1
        });
      }
    }
    
    function drawStars() {
      ctx.clearRect(0, 0, width, height);
      // Match stars to theme dynamically!
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      ctx.fillStyle = isDark ? "rgba(255, 255, 255, 0.8)" : "rgba(255, 255, 255, 0.6)"; 
      
      stars.forEach(star => {
        const parallaxX = (mouse.x - width/2) * 0.02;
        const parallaxY = (mouse.y - height/2) * 0.02;

        ctx.beginPath();
        ctx.arc(star.x + parallaxX, star.y + parallaxY, star.size, 0, Math.PI * 2);
        ctx.fill();
        
        star.y -= star.speed;
        if (star.y < -5) star.y = height + 5;
      });
      
      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', resize);
    resize();
    drawStars();
  </script>

<script>
  (() => {
    const NOTIFICATION_API_URL = "https://api.jsonbin.io/v3/b/6a0fb2fb6610dd3ae8858731?meta=false";
    const READ_KEY = "$2a$10$dmsG1/GXWAA5tim8ejcE8uKD75pB.KxZxZDzIAb4AdPcJAU93f9nK"; 

    async function checkNotifications() {
      try {
        const response = await fetch(NOTIFICATION_API_URL, { 
          headers: { "X-Master-Key": READ_KEY },
          cache: 'no-store' 
        });
        const data = await response.json();
        const liveMessage = data.message;
        const savedMessage = localStorage.getItem('astra_last_notification');

        if (liveMessage === "null" || !liveMessage) {
          localStorage.removeItem('astra_last_notification');
          return;
        }

        if (liveMessage !== savedMessage) {
          showPushNotification(liveMessage);
          localStorage.setItem('astra_last_notification', liveMessage);
        }
      } catch (error) { console.log("Notification check paused."); }
    }

    function showPushNotification(message) {
      if (document.getElementById('astra-push-toast')) return;
      const toast = document.createElement('div');
      toast.id = 'astra-push-toast';
      toast.style.cssText = `position:fixed; top:20px; right:20px; background:rgba(20,20,30,0.85); backdrop-filter:blur(20px); border:1px solid rgba(165,180,252,0.4); box-shadow:0 16px 40px rgba(0,0,0,0.7); color:#ffffff; padding:16px 24px; border-radius:20px; z-index:100000; display:flex; flex-direction:column; gap:8px; font-family:'Roboto Flex', sans-serif; animation:slideInRight 0.5s; max-width:300px;`;
      toast.innerHTML = `<div style="display:flex; justify-content:space-between;"><span style="font-size:0.8rem; color:#a5b4fc; text-transform:uppercase;">Incoming Message</span><button id="push-close" style="background:transparent; color:#9aa0b8; border:none; cursor:none;">&times;</button></div><div style="font-size:0.95rem;">${message}</div>`;
      document.body.appendChild(toast);
      document.getElementById('push-close').addEventListener('click', () => toast.remove());
    }

    checkNotifications();
    setInterval(checkNotifications, 30000);
  })();
</script>
