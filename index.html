<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astra</title>
  <style>
    /* 1. FORCE HIDE DEFAULT CURSOR GLOBALLY */
    *, *::before, *::after {
      cursor: none !important;
    }

    /* Reset & Base Styles */
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow-x: hidden;
      height: 100vh;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      /* Speeding up the fade transition to 0.5s */
      transition: opacity 0.5s ease-in-out, visibility 0.5s; 
      font-size: 3rem;
      letter-spacing: 0.5rem;
      font-weight: bold;
      /* Lowercase handled here or in HTML */
    }

    /* Main Content */
    header {
      font-size: 4rem;
      text-align: center;
      margin-top: 10vh;
      font-weight: 800;
      letter-spacing: -2px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
    }

    nav a {
      color: #888;
      text-decoration: none;
      font-size: 1.2rem;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-block;
      padding: 10px; /* Added padding to make hover target easier to hit */
    }

    /* Hover effect: Text gets bigger */
    nav a:hover {
      color: #fff;
      transform: scale(1.3); /* Slightly larger scale */
    }

    /* Custom Cursor */
    .cursor {
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10000;
      mix-blend-mode: difference;
      /* Will-change helps browser optimize rendering for movement */
      will-change: transform; 
      transition: width 0.3s, height 0.3s; /* Smooth expansion animation */
    }

    /* Cursor gets bigger on hover */
    .cursor.hover {
      width: 50px;
      height: 50px;
      /* Re-center the larger cursor so it doesn't drift */
      margin-left: -15px; 
      margin-top: -15px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div id="loading-screen">astra</div>

<header>Astra</header>

<nav>
  <a href="https://ethandupe.github.io/games-main/">Games</a>
  <a href="/astra/tools.html">Tools</a>
  <a href="/astra/apps.html">Apps</a>
</nav>

<div class="cursor" id="cursor"></div>

<script>
  const loadingScreen = document.getElementById('loading-screen');
  const cursor = document.getElementById('cursor');

  // 2. SPEED UP LOADING
  window.addEventListener('load', () => {
    setTimeout(() => {
      loadingScreen.style.opacity = '0';
      loadingScreen.style.visibility = 'hidden';
    }, 800); // Reduced wait time to 0.8 seconds
  });

  // 3. SMOOTH CURSOR LOGIC
  let mouseX = window.innerWidth / 2; // Start in center
  let mouseY = window.innerHeight / 2;
  let cursorX = window.innerWidth / 2;
  let cursorY = window.innerHeight / 2;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animateCursor() {
    // Math for smooth trailing (Lerp)
    // 0.1 is the "weight". Lower = smoother/slower. Higher = faster/responsive.
    const smoothness = 0.1; 
    
    cursorX += (mouseX - cursorX) * smoothness;
    cursorY += (mouseY - cursorY) * smoothness;
    
    // Using translate3d enables GPU acceleration for buttery smooth movement
    // The -10 centers the 20px cursor div
    cursor.style.transform = `translate3d(${cursorX - 10}px, ${cursorY - 10}px, 0)`;
    
    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  // Hover Interaction
  document.querySelectorAll('nav a').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
  });
</script>

</html>
