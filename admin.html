<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Astra – Admin Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: #050505; }
    .admin-container { max-width: 500px; margin: 15vh auto; background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px; text-align: center; }
    .glass-input { width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.3); color: #fff; margin-bottom: 20px; }
    .glass-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #6366f1; color: #fff; font-weight: 700; cursor: none; }
  </style>
</head>
<body>
  <div class="admin-container" id="login-screen">
    <h1>Restricted Area</h1>
    <input type="password" id="passcode-input" class="glass-input" placeholder="Passcode...">
    <button class="glass-btn" onclick="checkPasscode()">Unlock</button>
  </div>

  <div class="admin-container" id="dashboard" style="display:none;">
    <h1>Broadcast</h1>
    <textarea id="message-input" class="glass-input" placeholder="Type message..."></textarea>
    <button class="glass-btn" onclick="sendNotification()">Push Notification</button>
    <button class="glass-btn" onclick="clearNotification()" style="background:#ff3b30; margin-top:10px;">Send "Null"</button>
  </div>

  <script>
    const MASTER_KEY = "$2a$10$dmsG1/GXWAA5tim8ejcE8uKD75pB.KxZxZDzIAb4AdPcJAU93f9nK";
    const BIN_URL = "https://api.jsonbin.io/v3/b/6a0fb2fb6610dd3ae8858731";

    function checkPasscode() {
      if (document.getElementById('passcode-input').value === 'superbut76') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } else { alert('Access Denied.'); }
    }

    async function pushToDatabase(messagePayload) {
      await fetch(BIN_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
        body: JSON.stringify({ message: messagePayload })
      });
      alert("Broadcast Sent!");
    }

    function sendNotification() { pushToDatabase(document.getElementById('message-input').value); }
    function clearNotification() { pushToDatabase("null"); }
  </script>
</body>
</html>
