<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astra – Weather Monitor</title>
    
    <!-- 🚀 THEME BOUNCER -->
    <script>
      if (localStorage.getItem('astra-theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>

    <!-- Roboto Flex Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- Global Liquid Glass Styles -->
    <link rel="stylesheet" href="style.css">

    <style>
        /* --- PAGE SPECIFIC OVERRIDES --- */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Lock scrolling so map fills screen */
            background-color: #050505;
        }

        /* Nav back to home */
        .top-nav {
            position: absolute;
            top: 24px;
            right: 24px; /* Moved to right so it doesn't overlap the panel */
            z-index: 2000;
        }

        .top-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
        }

        .top-nav a:hover {
            color: var(--nav-hover-text);
            background: var(--nav-hover-bg);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        /* --- THE MAP --- */
        #map { 
            height: 100vh; 
            width: 100vw; 
            z-index: 1; 
            background: #0f111a; /* Match Astra dark background */
        }

        /* Allow default cursor interactions ON the map */
        #map, #map * {
            cursor: auto !important; 
        }

        /* --- ASTRA FROSTED GLASS PANEL --- */
        .glass-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 1000;
            width: 320px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 28px;
            box-shadow: var(--glass-shadow);
            color: var(--text-main);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Typography */
        h1 { 
            margin: 0; 
            font-size: 1.8rem; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            background: var(--header-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p.subtitle { 
            margin: 6px 0 24px 0; 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            font-weight: 500; 
        }

        /* Status Indicator */
        .live-status {
            display: inline-flex;
            align-items: center;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .pulse-dot {
            width: 8px; height: 8px; 
            background: #a5b4fc; 
            border-radius: 50%; 
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(165, 180, 252, 0.6); }
            70% { box-shadow: 0 0 0 8px rgba(165, 180, 252, 0); }
            100% { box-shadow: 0 0 0 0 rgba(165, 180, 252, 0); }
        }

        /* --- ASTRA LOCATION BUTTON --- */
        .location-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 24px;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .location-btn:hover { 
            background: var(--nav-hover-bg); 
            color: var(--nav-hover-text);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            border-color: transparent;
        }
        .loc-icon { width: 18px; height: 18px; fill: currentColor; }

        /* Legend Rows */
        .alert-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 14px; 
            font-size: 0.95rem; 
            font-weight: 600; 
            color: var(--text-muted);
        }
        .icon-box {
            width: 36px; height: 36px; 
            border-radius: 12px; 
            margin-right: 14px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #fff; font-size: 0.7rem; letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- USER LOCATION MARKER --- */
        .user-marker {
            background-color: #6366f1;
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
            animation: userPulse 2s infinite;
        }
        @keyframes userPulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        /* --- ASTRA LEAFLET POPUP STYLING --- */
        .leaflet-popup-content-wrapper {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border-radius: 20px;
            padding: 0;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            font-family: 'Roboto Flex', sans-serif;
            box-shadow: 0 16px 40px -10px rgba(0, 0, 0, 0.7);
        }
        .leaflet-popup-tip {
            background: rgba(20, 20, 30, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
        }
        .leaflet-popup-content { margin: 20px; width: 260px !important; }
        .popup-tag { 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: #a5b4fc; 
            margin-bottom: 6px; 
        }
        .popup-header { 
            font-size: 1.1rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            line-height: 1.3; 
        }
        .leaflet-container a.leaflet-popup-close-button {
            color: #9aa0b8;
            padding: 6px 6px 0 0;
        }
        .leaflet-container a.leaflet-popup-close-button:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="/astra/index.html" class="nav-btn">← Home</a>
    </nav>

    <!-- The Map Container -->
    <div id="map"></div>

    <!-- The Astra Glass UI Panel -->
    <div class="glass-panel" id="ui-panel">
        <div class="live-status">
            <div class="pulse-dot"></div>
            LIVE MONITOR
        </div>
        <h1>NOAA Feed</h1>
        <p id="status-text" class="subtitle">Waiting for user location..</p>
        
        <button class="location-btn" onclick="findUser()" id="loc-btn">
            <svg class="loc-icon" viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            Locate Me
        </button>

        <div class="alert-row">
            <div class="icon-box" style="background: #ff3b30;">EXT</div>
            <span>Extreme Warning</span>
        </div>
        <div class="alert-row">
            <div class="icon-box" style="background: #ff9500;">SEV</div>
            <span>Severe Warning</span>
        </div>
        <div class="alert-row">
            <div class="icon-box" style="background: #ffcc00; color: #1a1a2e;">MOD</div>
            <span>Moderate Watch</span>
        </div>
    </div>

    <!-- The Custom Astra Cursor -->
    <div class="cursor" id="cursor"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script>
        // --- 1. SMOOTH CURSOR (Astra Logic) ---
        const cursor = document.getElementById('cursor');
        const mapContainer = document.getElementById('map');
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let curPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        document.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function animateCursor() {
            const ease = 0.15;
            curPos.x += (mouse.x - curPos.x) * ease;
            curPos.y += (mouse.y - curPos.y) * ease;
            cursor.style.left = `${curPos.x}px`;
            cursor.style.top = `${curPos.y}px`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Wire hover events to Astra UI buttons, but HIDE cursor when over the map
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        mapContainer.addEventListener('mouseenter', () => cursor.style.display = 'none');
        document.getElementById('ui-panel').addEventListener('mouseenter', () => cursor.style.display = 'block');
        document.querySelector('.top-nav').addEventListener('mouseenter', () => cursor.style.display = 'block');


        // --- 2. MAP INIT (DARK MODE TILES) ---
        const map = L.map('map', {
            zoomControl: false,
            zoomSnap: 0,
            zoomDelta: 0.5
        }).setView([39.8283, -98.5795], 4); // Center of USA

        // CARTO Dark Matter Tiles - Matches Astra perfectly
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        // Optional Zoom Controls in bottom right
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // --- 3. USER LOCATION LOGIC ---
        function findUser() {
            const status = document.getElementById('status-text');
            status.innerText = "Requesting GPS access...";

            if (!navigator.geolocation) {
                status.innerText = "Geolocation not supported.";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // Fly to user
                    map.flyTo([lat, lon], 9, { duration: 2 });
                    
                    // Add User Marker
                    const userIcon = L.divIcon({
                        className: 'user-marker',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });
                    
                    L.marker([lat, lon], {icon: userIcon}).addTo(map)
                     .bindPopup("<div style='text-align:center;font-weight:700;'>You are here 📍</div>").openPopup();

                    status.innerText = "Scanning immediate sector...";
                },
                () => {
                    status.innerText = "Location access denied.";
                }
            );
        }

        // --- 4. NOAA WEATHER FETCH LOGIC ---
        function getStyle(feature) {
            let color = '#34c759'; // Safe Green
            const severity = feature.properties.severity;
            if (severity === 'Extreme') color = '#ff3b30'; // Red
            else if (severity === 'Severe') color = '#ff9500'; // Orange
            else if (severity === 'Moderate') color = '#ffcc00'; // Yellow

            return { fillColor: color, color: color, weight: 1, fillOpacity: 0.4 };
        }

        fetch('https://api.weather.gov/alerts/active?status=actual&message_type=alert,update')
            .then(res => res.json())
            .then(data => {
                const validFeatures = data.features.filter(f => f.geometry !== null);
                L.geoJSON(validFeatures, {
                    style: getStyle,
                    onEachFeature: (feature, layer) => {
                        const p = feature.properties;
                        layer.bindPopup(`
                            <div class="popup-tag">${p.severity} Priority</div>
                            <div class="popup-header">${p.event}</div>
                            <div style="font-size:0.85rem;color:#9aa0b8;font-weight:500;">
                              Ends: ${new Date(p.expires).toLocaleTimeString()}
                            </div>
                        `);
                    }
                }).addTo(map);
                
                document.getElementById('status-text').innerText = `${validFeatures.length} active alerts nationwide.`;
            })
            .catch(err => {
                document.getElementById('status-text').innerText = "Failed to load NOAA feed.";
            });

    </script>

    <!-- 🚀 ASTRA AUTO-UPDATE CHECKER -->
    <script src="updatechecker.js"></script>

</body>
</html>
